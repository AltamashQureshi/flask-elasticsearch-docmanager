<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#0f1117"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">Flask Elasticsearch Document Manager</text>
  <text x="450" y="62" text-anchor="middle" fill="#64748b" font-size="12">Architecture Overview</text>

  <!-- Client Box -->
  <rect x="30" y="100" width="140" height="70" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="130" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">🌐 Client</text>
  <text x="100" y="150" text-anchor="middle" fill="#64748b" font-size="10">Browser / User</text>
  <text x="100" y="163" text-anchor="middle" fill="#64748b" font-size="10">Port 80</text>

  <!-- Arrow: Client → Nginx -->
  <line x1="170" y1="135" x2="230" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="200" y="128" text-anchor="middle" fill="#94a3b8" font-size="9">HTTP</text>

  <!-- Nginx Box -->
  <rect x="230" y="100" width="150" height="70" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="305" y="127" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="600">⚡ Nginx</text>
  <text x="305" y="145" text-anchor="middle" fill="#64748b" font-size="10">Reverse Proxy</text>
  <text x="305" y="158" text-anchor="middle" fill="#64748b" font-size="10">10MB file limit</text>

  <!-- Arrow: Nginx → Flask -->
  <line x1="380" y1="135" x2="450" y2="135" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="415" y="128" text-anchor="middle" fill="#94a3b8" font-size="9">Proxy</text>

  <!-- Flask Box -->
  <rect x="450" y="85" width="190" height="120" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="545" y="112" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">🐍 Flask App</text>
  <text x="545" y="130" text-anchor="middle" fill="#64748b" font-size="10">Gunicorn WSGI (2 workers)</text>
  <text x="545" y="146" text-anchor="middle" fill="#94a3b8" font-size="10">Routes:</text>
  <text x="545" y="160" text-anchor="middle" fill="#64748b" font-size="9">/ (login) · /home · /view</text>
  <text x="545" y="173" text-anchor="middle" fill="#64748b" font-size="9">/edit · /delete · /download</text>
  <text x="545" y="186" text-anchor="middle" fill="#64748b" font-size="9">/api/stats · /logout</text>

  <!-- Arrow: Flask → Elasticsearch -->
  <line x1="545" y1="205" x2="545" y2="270" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="560" y="243" fill="#94a3b8" font-size="9">HTTP REST</text>

  <!-- Elasticsearch Box -->
  <rect x="390" y="270" width="310" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="545" y="295" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">🔍 Elasticsearch 8.11.0</text>
  <text x="545" y="313" text-anchor="middle" fill="#64748b" font-size="10">Port 9200 · Single Node</text>
  
  <!-- Index card inside ES box -->
  <rect x="405" y="325" width="270" height="65" rx="6" fill="#0f1117" stroke="#374151" stroke-width="1"/>
  <text x="540" y="343" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">Index: uploads</text>
  <text x="540" y="358" text-anchor="middle" fill="#64748b" font-size="9">filename · content · content_base64</text>
  <text x="540" y="372" text-anchor="middle" fill="#64748b" font-size="9">upload_date · file_size · mime_type · is_binary</text>
  <text x="540" y="384" text-anchor="middle" fill="#64748b" font-size="9">UUID-based document IDs</text>

  <!-- Docker Network Box -->
  <rect x="20" y="440" width="660" height="60" rx="10" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="463" fill="#475569" font-size="11" font-weight="600">🐳 Docker Network: flasknet</text>
  <text x="40" y="480" fill="#374151" font-size="10">elasticsearch · flask · nginx containers share bridge network</text>

  <!-- Features Panel -->
  <rect x="720" y="85" width="160" height="300" rx="10" fill="#1e293b" stroke="#374151" stroke-width="1.5"/>
  <text x="800" y="110" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">Features</text>
  <line x1="735" y1="118" x2="865" y2="118" stroke="#374151" stroke-width="1"/>
  
  <text x="736" y="138" fill="#22c55e" font-size="11">✓ Session Auth</text>
  <text x="736" y="156" fill="#22c55e" font-size="11">✓ File Upload</text>
  <text x="736" y="174" fill="#22c55e" font-size="11">✓ Full-text Search</text>
  <text x="736" y="192" fill="#22c55e" font-size="11">✓ View / Edit</text>
  <text x="736" y="210" fill="#22c55e" font-size="11">✓ Download</text>
  <text x="736" y="228" fill="#22c55e" font-size="11">✓ Delete</text>
  <text x="736" y="246" fill="#22c55e" font-size="11">✓ MIME Detection</text>
  <text x="736" y="264" fill="#22c55e" font-size="11">✓ Binary as Base64</text>
  <text x="736" y="282" fill="#22c55e" font-size="11">✓ REST Stats API</text>
  <line x1="735" y1="295" x2="865" y2="295" stroke="#374151" stroke-width="1"/>
  <text x="800" y="313" text-anchor="middle" fill="#94a3b8" font-size="10">Tech Stack</text>
  <text x="800" y="330" text-anchor="middle" fill="#64748b" font-size="10">Python 3.10-slim</text>
  <text x="800" y="346" text-anchor="middle" fill="#64748b" font-size="10">gunicorn · Flask</text>
  <text x="800" y="362" text-anchor="middle" fill="#64748b" font-size="10">elasticsearch-py</text>

  <!-- File Type Panel -->
  <rect x="20" y="515" width="660" height="85" rx="10" fill="#1e293b" stroke="#374151" stroke-width="1.5"/>
  <text x="350" y="537" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">File Handling Strategy</text>
  
  <rect x="30" y="548" width="300" height="42" rx="6" fill="#0f1117" stroke="#22c55e" stroke-width="1"/>
  <text x="180" y="565" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">📄 Text Files (Searchable + Editable)</text>
  <text x="180" y="582" text-anchor="middle" fill="#64748b" font-size="9">.txt .json .py .sh .md .yaml → UTF-8 indexed</text>

  <rect x="345" y="548" width="325" height="42" rx="6" fill="#0f1117" stroke="#f59e0b" stroke-width="1"/>
  <text x="507" y="565" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">🗃️ Binary Files (Download Only)</text>
  <text x="507" y="582" text-anchor="middle" fill="#64748b" font-size="9">.pdf .docx .png .zip .mp4 → Base64 encoded</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#a78bfa"/>
    </marker>
  </defs>
</svg>
